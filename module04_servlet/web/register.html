<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <style>
        .name {
            display: inline-block;
            width: 70px;
        }
    </style>
</head>
<body>
    <h2>注册</h2>
    <form action="/servlet_demo/request_demo" method="post" >
        <div>
            <span class="name">用户名：</span>
            <input type="text" name="name" placeholder="请输入用户名">
        </div>
        <div>
            <span class="name">密码：</span>
            <input type="password" name="password" placeholder="请输入密码">
        </div>
        <div>
            <span class="name">爱好：</span>
            <label><input type="checkbox" name="hobby" value="game">游戏</label>
            <label><input type="checkbox" name="hobby" value="study">学习</label>
            <label><input type="checkbox" name="hobby" value="read">看书</label>
        </div>
        <button type="submit">注册</button>
    </form>
</body>
</html>
